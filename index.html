<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Coffee Wkwkwk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;700&display=swap');
        .meme-font { font-family: 'Bangers', cursive; }
        body { 
            font-family: 'Poppins', sans-serif; 
            /* Warna background coklat gelap ala kopi */
            background: #1a0f0a; 
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center py-10 px-5">

    <h1 class="text-5xl meme-font text-amber-500 mb-2 tracking-wider">CEK SISA UMUR</h1>
    <p class="text-amber-200/60 mb-8 italic text-center text-sm">CEK SISA UMUR</p>

    <div class="bg-[#2d1b14] p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-amber-600">
        <div id="setup-section">
            <label class="block mb-2 font-bold text-amber-100">Nama Warga Mood Coffee?</label>
            <input type="text" id="username" placeholder="ketiken jenengmu su" 
                class="w-full p-3 rounded-lg bg-[#3d2a22] border border-amber-900/50 text-white focus:outline-none focus:ring-2 focus:ring-amber-500 mb-4">
            <button onclick="startPrediction()" 
                class="w-full bg-amber-600 hover:bg-amber-700 text-white font-black py-3 rounded-lg transition-all active:scale-95 shadow-lg">
                KETAUAN BOTI KITA GEBUKIN! ☕
            </button>
        </div>

        <div id="result-section" class="hidden text-center">
            <h2 id="display-name" class="text-2xl font-bold text-amber-400 mb-1 uppercase"></h2>
            <div id="age-result" class="text-4xl font-black mb-4 text-red-500 meme-font tracking-widest"></div>
            
            <div class="bg-black/30 p-3 rounded-lg mb-6 border border-amber-900/30">
                <p id="meme-quote" class="text-sm italic text-amber-100"></p>
            </div>
            
            <div id="meme-container" class="mb-6 rounded-lg overflow-hidden border-2 border-amber-800 bg-black min-h-[200px] flex items-center justify-center shadow-inner">
                <img id="meme-image" src="" alt="Meme" class="w-full">
            </div>

            <button onclick="resetApp()" class="text-amber-500/70 hover:text-amber-400 text-sm underline">Coba Nama Warga Lain</button>
        </div>
    </div>

    <footer class="mt-10 text-amber-900 text-xs font-bold">
        &copy; 2024 MOOD COFFEE - demm
    </footer>

    <script>
        // Kutipan yang disesuaikan dengan kultur kopi
        const quotes = [
            "Waktunya tobat.",
            "Sisa umurmu cukup buat nungguin biji kopi roasting sampai matang.",
            "wkwkwk.",
            "Jangan mati dulu, lau belum mbojo",
            "Sisa umurmu aman, selama stok Espresso masih ada.",
            "Kamu bakal panjang umur kalau rajin kasih tips ke daffa.",
            "Waktumu tinggal dikit, tobat tolol!",
            "Sisa umurmu cukup untuk ngocok."
        ];

        async function startPrediction() {
            const name = document.getElementById('username').value;
            if (!name) return alert("Isi nama warga dulu!");

            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            
            // Random Data (Angka random dan satuan waktu)
            const randomAge = Math.floor(Math.random() * 80) + 1;
            const units = ['Sruputan Lagi', 'Cangkir Kopi', 'Hari', 'Bulan', 'Tahun', 'Abad'];
            const randomUnit = units[Math.floor(Math.random() * units.length)];
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

            document.getElementById('display-name').innerText = name;
            document.getElementById('age-result').innerText = `SISA: ${randomAge} ${randomUnit}`;
            document.getElementById('meme-quote').innerText = `"${randomQuote}"`;

            // Get Meme (API Publik)
            try {
                const response = await fetch('https://meme-api.com/gimme');
                const data = await response.json();
                document.getElementById('meme-image').src = data.url;
            } catch (e) {
                document.getElementById('meme-image').src = "https://via.placeholder.com/300?text=Koneksi+Barista+Putus";
            }
        }

        function resetApp() {
            document.getElementById('setup-section').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('username').value = "";
        }
    </script>

</body>
</html>
