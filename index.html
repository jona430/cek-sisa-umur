<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme & Age Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;700&display=swap');
        .meme-font { font-family: 'Bangers', cursive; }
        body { font-family: 'Poppins', sans-serif; background: #0f172a; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center py-10 px-5">

    <h1 class="text-5xl meme-font text-yellow-400 mb-2 tracking-wider">MEME DESTINY</h1>
    <p class="text-gray-400 mb-8 italic text-center text-sm">Masukan namamu, ketahui takdirmu (Hanya untuk hiburan!)</p>

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-yellow-500">
        <div id="setup-section">
            <label class="block mb-2 font-bold">Siapa namamu, Manusia Fana?</label>
            <input type="text" id="username" placeholder="Contoh: Budi Gaming" 
                class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-yellow-500 mb-4">
            <button onclick="startPrediction()" 
                class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-3 rounded-lg transition-all active:scale-95">
                CEK SISA UMUR & MEME!
            </button>
        </div>

        <div id="result-section" class="hidden text-center animate-fade-in">
            <h2 id="display-name" class="text-2xl font-bold text-yellow-400 mb-1"></h2>
            <div id="age-result" class="text-4xl font-black mb-4 text-red-500 meme-font"></div>
            <p id="meme-quote" class="text-sm italic text-gray-300 mb-6"></p>
            
            <div id="meme-container" class="mb-6 rounded-lg overflow-hidden border-2 border-gray-700 bg-black min-h-[200px] flex items-center justify-center">
                <img id="meme-image" src="" alt="Meme" class="w-full">
            </div>

            <button onclick="resetApp()" class="text-gray-400 hover:text-white text-sm underline">Coba Nama Lain</button>
        </div>
    </div>

    <script>
        const quotes = [
            "Waktunya tobat, mabar dikurangi.",
            "Masih sempat buat 1000 postingan cringe lagi.",
            "Jangan lupa bayar paylater sebelum 'pergi'.",
            "Malaikat maut pun bingung lihat kelakuanmu.",
            "Sisa umurmu cukup untuk nonton One Piece sampai tamat (mungkin).",
            "Tenang, sisa umurmu masih cukup panjang untuk ditolak gebetan."
        ];

        async function startPrediction() {
            const name = document.getElementById('username').value;
            if (!name) return alert("Isi namamu dulu!");

            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            
            // Random Data
            const randomAge = Math.floor(Math.random() * 99) + 1;
            const randomUnit = ['Hari', 'Bulan', 'Tahun', 'Abad', 'Menit'][Math.floor(Math.random() * 5)];
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

            document.getElementById('display-name').innerText = name;
            document.getElementById('age-result').innerText = `Sisa Umur: ${randomAge} ${randomUnit}`;
            document.getElementById('meme-quote').innerText = `"${randomQuote}"`;

            // Get Meme
            try {
                const response = await fetch('https://meme-api.com/gimme');
                const data = await response.json();
                document.getElementById('meme-image').src = data.url;
            } catch (e) {
                document.getElementById('meme-image').src = "https://via.placeholder.com/300?text=Gagal+Muat+Meme";
            }
        }

        function resetApp() {
            document.getElementById('setup-section').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('username').value = "";
        }
    </script>

</body>
</html>
